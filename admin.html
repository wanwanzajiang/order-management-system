<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 管理员</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📦 订单管理系统 - 管理员</h1>
      <div class="header-info">
        <div class="user-info">
          <span id="userName">管理员</span>
          <span class="role-badge" id="userRole">管理员</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">退出登录</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h3 class="card-title">➕ 新增订单</h3>
      <form id="addOrderForm">
        <div class="form-row">
          <div class="form-group">
            <label for="invoiceNo">发票号 *</label>
            <input type="text" id="invoiceNo" class="form-control" placeholder="请输入发票号" required>
          </div>
          <div class="form-group">
            <label for="productModel">产品型号 *</label>
            <input type="text" id="productModel" class="form-control" placeholder="请输入产品型号" required>
          </div>
          <div class="form-group">
            <label for="quantity">数量 *</label>
            <input type="number" id="quantity" class="form-control" placeholder="请输入数量" min="1" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">添加订单</button>
      </form>
    </div>

    <div class="card">
      <h3 class="card-title">📋 全部订单</h3>
      <div id="ordersContainer">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    © 2024 订单管理系统
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!Auth.requireRole([CONFIG.ROLES.ADMIN])) {
      // Already redirected
    } else {
      init();
    }

    async function init() {
      const user = Auth.getUser();
      document.getElementById('userName').textContent = user.full_name || user.email;
      document.getElementById('userRole').textContent = App.getRoleName(user.role);
      await loadOrders();
    }

    async function loadOrders() {
      const container = document.getElementById('ordersContainer');
      App.showLoading(container);

      const { data, error } = await API.getOrders();

      if (error) {
        App.showError(container, '加载订单失败: ' + error.message);
        return;
      }

      if (!data || data.length === 0) {
        App.showEmpty(container, '暂无订单');
        return;
      }

      renderOrders(data);
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');
      let html = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>发票号</th>
                <th>产品型号</th>
                <th>数量</th>
                <th>状态</th>
                <th>仓库备注</th>
                <th>业务员备注</th>
                <th>业务员</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
      `;

      orders.forEach(order => {
        const statusClass = App.getStatusClass(order.order_status);
        html += `
          <tr data-id="${order.id}">
            <td>${App.escapeHtml(order.invoice_no)}</td>
            <td>${App.escapeHtml(order.product_model)}</td>
            <td>${order.quantity}</td>
            <td>
              <select class="form-control status-select" onchange="updateStatus(${order.id}, this.value)" style="width:120px;">
                ${CONFIG.ORDER_STATUSES.map(s => `<option value="${s}" ${s === order.order_status ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </td>
            <td>
              <input type="text" class="notes-input warehouse-notes" value="${App.escapeHtml(order.warehouse_notes || '')}"
                onblur="updateWarehouseNotes(${order.id}, this.value)" placeholder="仓库备注">
            </td>
            <td>
              <input type="text" class="notes-input sales-notes" value="${App.escapeHtml(order.sales_notes || '')}"
                onblur="updateSalesNotes(${order.id}, this.value)" placeholder="业务员备注">
            </td>
            <td>${App.escapeHtml(order.user_profiles?.full_name || '-')}</td>
            <td>${App.formatDate(order.created_at)}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteOrder(${order.id})">删除</button>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    document.getElementById('addOrderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const invoiceNo = document.getElementById('invoiceNo').value.trim();
      const productModel = document.getElementById('productModel').value.trim();
      const quantity = parseInt(document.getElementById('quantity').value);

      if (!invoiceNo || !productModel || !quantity) {
        showToast('请填写所有必填字段', 'error');
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = '添加中...';

      const { data, error } = await API.createOrder({ invoice_no: invoiceNo, product_model: productModel, quantity });

      btn.disabled = false;
      btn.textContent = '添加订单';

      if (error) {
        showToast('添加失败: ' + error.message, 'error');
        return;
      }

      showToast('订单添加成功', 'success');
      e.target.reset();
      await loadOrders();
    });

    async function updateStatus(orderId, status) {
      const { error } = await API.updateOrder(orderId, { order_status: status });
      if (error) {
        showToast('更新状态失败: ' + error.message, 'error');
      } else {
        showToast('状态已更新', 'success');
      }
    }

    async function updateWarehouseNotes(orderId, notes) {
      const { error } = await API.updateOrder(orderId, { warehouse_notes: notes });
      if (error) {
        showToast('更新备注失败: ' + error.message, 'error');
      }
    }

    async function updateSalesNotes(orderId, notes) {
      const { error } = await API.updateOrder(orderId, { sales_notes: notes });
      if (error) {
        showToast('更新备注失败: ' + error.message, 'error');
      } else {
        showToast('备注已更新', 'success');
      }
    }

    async function deleteOrder(orderId) {
      if (!confirm('确定要删除此订单吗？')) return;

      const { error } = await API.deleteOrder(orderId);
      if (error) {
        showToast('删除失败: ' + error.message, 'error');
      } else {
        showToast('订单已删除', 'success');
        await loadOrders();
      }
    }
  </script>
</body>
</html>
