<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进度回复系统 - 管理</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{font-family:sans-serif;background:#f5f3ee;margin:0}
.header{background:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.header h1{font-size:18px;margin:0;color:#333}
.user-info{display:flex;align-items:center;gap:12px}
.role-badge{padding:2px 10px;border-radius:12px;font-size:12px;background:#e07a5f;color:#fff}
.container{max-width:1200px;margin:20px auto;padding:0 20px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:8px 18px;border:none;background:#e8e6dd;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px}
.tab.active{background:#fff;font-weight:500}
.tab-content{display:none;background:#fff;border-radius:0 12px 12px 12px;padding:20px}
.tab-content.active{display:block}
.card{background:#fdfbf7;border:1px solid #e8e6dd;border-radius:12px;padding:16px;margin-bottom:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
th{background:#f8f7f2;font-weight:500;color:#555}
input,select,textarea{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.btn{padding:6px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary{background:#e07a5f;color:#fff}
.btn-danger{background:#e24b4a;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.loading{text-align:center;padding:40px;color:#999}
.empty{text-align:center;padding:40px;color:#bbb}
.toast{position:fixed;top:20px;right:20px;padding:10px 20px;border-radius:8px;color:#fff;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:#27ae60}
.toast-error{background:#e24b4a}
.inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="header">
<h1>📦 进度回复系统</h1>
<div class="user-info">
<span id="userName">-</span>
<span class="role-badge" id="userRole">-</span>
<a href="#" onclick="Auth.logout()" style="font-size:12px;color:#999">退出</a>
</div>
</div>

<div class="container">
<div class="tabs">
<button class="tab active" onclick="switchTab('orders')">📋 订单</button>
<button class="tab" onclick="switchTab('salespeople')">👥 业务员</button>
<button class="tab" onclick="switchTab('accounts')">🔑 账号</button>
<button class="tab" id="superEntry" style="display:none" onclick="switchTab('console')">⚙️ 控制台</button>
</div>

<div class="tab-content active" id="tab-orders">
<div class="inline-form">
<input id="newInvoice" placeholder="到款单号" style="width:160px">
<input id="newModel" placeholder="产品型号" style="width:200px">
<input id="newQty" type="number" value="1" placeholder="数量" style="width:70px">
<select id="newSp"><option value="">选择业务员</option></select>
<button class="btn btn-primary" onclick="addOrder()">添加订单</button>
</div>
<div class="filter-row">
<select id="filterStatus" onchange="loadOrders()"><option value="">全部状态</option>
<option>调货中</option><option>路途中</option><option>已到货</option><option>已完结</option></select>
<select id="filterSp" onchange="loadOrders()"><option value="">全部业务员</option></select>
</div>
<div id="ordersList"></div>
</div>

<div class="tab-content" id="tab-salespeople">
<div class="inline-form">
<input id="newSpName" placeholder="业务员姓名" style="width:160px">
<input id="newSpCode" placeholder="识别码" style="width:120px">
<button class="btn btn-primary" onclick="addSp()">添加业务员</button>
</div>
<div id="spList"></div>
</div>

<div class="tab-content" id="tab-accounts">
<div id="accountsList"></div>
</div>

<div class="tab-content" id="tab-console">
<p><a href="console.html" target="_blank">打开控制台 →</a></p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireRole(['admin','super_admin'])) return;
  init();
});

async function init() {
  const user = Auth.getUser();
  document.getElementById('userName').textContent = user.full_name || user.email;
  document.getElementById('userRole').textContent = user.role === 'super_admin' ? '超级管理员' : '管理员';
  if (user.role === 'super_admin') document.getElementById('superEntry').style.display = '';
  await loadSpSelects();
  await loadOrders();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes(name) || t.id === 'superEntry' && name === 'console'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'salespeople') loadSpList();
  if (name === 'accounts') loadAccounts();
}

// ===== 订单 =====
async function loadSpSelects() {
  const { data } = await API.getSalespeople();
  const opts = (data||[]).map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  document.getElementById('newSp').innerHTML = '<option value="">选择业务员</option>' + opts;
  document.getElementById('filterSp').innerHTML = '<option value="">全部业务员</option>' + opts;
}

async function loadOrders() {
  const container = document.getElementById('ordersList');
  container.innerHTML = '<div class="loading">加载中...</div>';
  const status = document.getElementById('filterStatus').value;
  const sp = document.getElementById('filterSp').value;
  const { data, error } = await API.getOrders({ status, sp });
  if (error) { container.innerHTML = '<div class="empty">加载失败: ' + error.message + '</div>'; return; }
  if (!data || data.length === 0) { container.innerHTML = '<div class="empty">暂无订单</div>'; return; }

  let html = '<table><thead><tr><th>到款单号</th><th>日期</th><th>产品</th><th>数量</th><th>业务员</th><th>状态</th><th>预计发货</th><th>进度回复</th><th>操作</th></tr></thead><tbody>';
  data.forEach(o => {
    const statusColor = { '调货中': '#e67e22', '路途中': '#3498db', '已到货': '#27ae60', '已完结': '#95a5a6' }[o.order_status] || '#999';
    html += `<tr>
      <td><strong>${o.invoice_no}</strong></td>
      <td>${o.order_date || '-'}</td>
      <td>${o.product_model || '-'}</td>
      <td>${o.quantity || '-'}</td>
      <td>${o.salesperson_name || '-'}</td>
      <td><span style="color:${statusColor};font-weight:500">${o.order_status || '-'}</span></td>
      <td>${o.shipping_date || '-'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.warehouse_notes || '-'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delOrder(${o.id})">删除</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

async function addOrder() {
  const inv = document.getElementById('newInvoice').value.trim();
  const model = document.getElementById('newModel').value.trim();
  const qty = parseInt(document.getElementById('newQty').value) || 1;
  const sp = document.getElementById('newSp').value;
  if (!inv || !model) { toast('到款单号和产品型号必填', 'error'); return; }
  const { error } = await API.createOrder({ invoice_no: inv, product_model: model, quantity: qty, salesperson_name: sp || null });
  if (error) { toast('添加失败: ' + error.message, 'error'); return; }
  toast('订单已添加', 'success');
  document.getElementById('newInvoice').value = '';
  document.getElementById('newModel').value = '';
  await loadOrders();
}

async function delOrder(id) {
  if (!confirm('确定删除？')) return;
  await API.deleteOrder(id);
  await loadOrders();
}

// ===== 业务员 =====
async function loadSpList() {
  const container = document.getElementById('spList');
  const { data } = await API.getSalespeople(false);
  if (!data || data.length === 0) { container.innerHTML = '<div class="empty">暂无业务员</div>'; return; }
  let html = '<table><thead><tr><th>姓名</th><th>识别码</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  data.forEach(s => {
    html += `<tr>
      <td>${s.name}</td><td>${s.access_code || '-'}</td>
      <td>${s.is_active ? '✅ 启用' : '❌ 停用'}</td>
      <td><button class="btn btn-sm" onclick="toggleSp(${s.id},${!s.is_active})">${s.is_active ? '停用' : '启用'}</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

async function addSp() {
  const name = document.getElementById('newSpName').value.trim();
  const code = document.getElementById('newSpCode').value.trim().toUpperCase();
  if (!name) { toast('请输入姓名', 'error'); return; }
  const { error } = await API.addSalesperson(name, code);
  if (error) { toast('添加失败: ' + error.message, 'error'); return; }
  toast('业务员已添加', 'success');
  document.getElementById('newSpName').value = '';
  document.getElementById('newSpCode').value = '';
  await loadSpList();
  await loadSpSelects();
}

async function toggleSp(id, active) {
  await API.toggleSalesperson(id, active);
  await loadSpList();
}

// ===== 账号 =====
async function loadAccounts() {
  const container = document.getElementById('accountsList');
  const { data } = await API.getProfiles();
  if (!data || data.length === 0) { container.innerHTML = '<div class="empty">暂无账号</div>'; return; }
  let html = '<table><thead><tr><th>邮箱</th><th>角色</th><th>操作</th></tr></thead><tbody>';
  data.forEach(p => {
    html += `<tr><td>${p.email}</td>
      <td><select id="role_${p.id}" onchange="updateRole('${p.id}',this.value)">
        <option value="super_admin" ${p.role==='super_admin'?'selected':''}>超级管理员</option>
        <option value="admin" ${p.role==='admin'?'selected':''}>管理员</option>
        <option value="warehouse" ${p.role==='warehouse'?'selected':''}>仓库</option>
        <option value="sales" ${p.role==='sales'?'selected':''}>业务员</option>
      </select></td>
      <td>-</td></tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

async function updateRole(id, role) {
  await API.updateProfileRole(id, role);
  toast('角色已更新', 'success');
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'success');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2500);
}
</script>
</body>
</html>
