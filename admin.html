<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 管理员</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📦 订单管理系统 - 管理员</h1>
      <div class="header-info">
        <div class="user-info">
          <span id="userName">管理员</span>
          <span class="role-badge" id="userRole">管理员</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">退出登录</button>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Tab 导航 -->
    <div class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 数据概览</button>
      <button class="tab-btn" data-tab="orders" onclick="switchTab('orders')">📋 订单管理</button>
      <button class="tab-btn" data-tab="salespeople" onclick="switchTab('salespeople')">👥 业务员管理</button>
    </div>

    <!-- ===== Tab 1: 数据概览 ===== -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card stat-total"><div class="stat-number">-</div><div class="stat-label">总订单数</div></div>
        <div class="stat-card stat-pending"><div class="stat-number">-</div><div class="stat-label">调货中</div></div>
        <div class="stat-card stat-transit"><div class="stat-number">-</div><div class="stat-label">路途中</div></div>
        <div class="stat-card stat-arrived"><div class="stat-number">-</div><div class="stat-label">已到货</div></div>
        <div class="stat-card stat-completed"><div class="stat-number">-</div><div class="stat-label">已完结</div></div>
        <div class="stat-card stat-users"><div class="stat-number">-</div><div class="stat-label">业务员人数</div></div>
      </div>

      <div class="card">
        <h3 class="card-title">📈 业务员订单排行</h3>
        <div id="salesStatsContainer">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>

    <!-- ===== Tab 2: 订单管理 ===== -->
    <div class="tab-content" id="tab-orders" style="display:none;">
      <!-- 新增订单表单（增强版） -->
      <div class="card">
        <h3 class="card-title">➕ 新增订单</h3>
        <form id="addOrderForm">
          <div class="form-row">
            <div class="form-group">
              <label for="invoiceNo">发票号 / 单号 *</label>
              <input type="text" id="invoiceNo" class="form-control" placeholder="如：INV-20260528-001" required>
            </div>
            <div class="form-group">
              <label for="orderDate">单据日期</label>
              <input type="date" id="orderDate" class="form-control">
            </div>
            <div class="form-group">
              <label for="brand">品牌</label>
              <input type="text" id="brand" class="form-control" placeholder="如：Apple、Samsung">
            </div>
            <div class="form-group">
              <label for="productModel">产品型号 *</label>
              <input type="text" id="productModel" class="form-control" placeholder="如：iPhone 16 Pro" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="quantity">数量 *</label>
              <input type="number" id="quantity" class="form-control" placeholder="请输入数量" min="1" required>
            </div>
            <div class="form-group">
              <label for="deliveryDate">合同货期 / 交期</label>
              <input type="date" id="deliveryDate" class="form-control" placeholder="约定交货日期">
            </div>
            <div class="form-group">
              <label for="salespersonName">所属业务员 *</label>
              <select id="salespersonName" class="form-control" required>
                <option value="">请选择业务员</option>
              </select>
              <small class="form-hint" style="color:#888;font-size:12px;">如无选项，请到「业务员管理」添加</small>
            </div>
            <div class="form-group">
              <label for="salesNotes">业务员备注</label>
              <input type="text" id="salesNotes" class="form-control" placeholder="选填">
            </div>
          </div>
          <button type="submit" class="btn btn-primary">添加订单</button>
        </form>
      </div>

      <!-- 订单筛选 + 列表 -->
      <div class="card">
        <h3 class="card-title">📋 全部订单</h3>
        <div class="filter-bar">
          <select id="filterStatus" class="form-control" onchange="loadOrders()" style="width:auto;min-width:140px;">
            <option value="">全部状态</option>
            <option value="调货中">调货中</option>
            <option value="路途中">路途中</option>
            <option value="已到货">已到货</option>
            <option value="已完结">已完结</option>
          </select>
          <select id="filterSalesperson" class="form-control" onchange="loadOrders()" style="width:auto;min-width:140px;">
            <option value="">全部业务员</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="loadOrders()">刷新列表</button>
        </div>
        <div id="ordersContainer">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>

    <!-- ===== Tab 3: 业务员管理（原用户管理改造） ===== -->
    <div class="tab-content" id="tab-salespeople" style="display:none;">
      <div class="card">
        <h3 class="card-title">➕ 添加业务员姓名</h3>
        <p style="font-size:13px;color:#666;margin-bottom:16px;">业务员姓名独立于登录账号。多个实际业务员可共用同一个系统账号登录，通过姓名区分各自的单据。</p>
        <form id="addSalespersonForm">
          <div class="form-row">
            <div class="form-group" style="max-width:300px;">
              <label for="newSpName">业务员姓名 *</label>
              <input type="text" id="newSpName" class="form-control" placeholder="如：张三、李四" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">添加业务员</button>
        </form>
      </div>

      <div class="card">
        <h3 class="card-title">👥 业务员列表</h3>
        <p style="font-size:12px;color:#888;margin-bottom:12px;">💡 可编辑姓名或删除。删除后历史订单中的名字会保留。</p>
        <div id="spContainer">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>

  </main>

  <footer class="footer">
    © <span id="footerYear"></span> 订单管理系统 · 管理员面板
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 页脚年份
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    if (!Auth.requireRole([CONFIG.ROLES.ADMIN])) {
      // 已重定向
    } else {
      init();
    }

    // ========== Tab 切换 ==========
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
      document.querySelectorAll('.tab-content').forEach(content => {
        content.style.display = 'none';
        content.classList.remove('active');
      });
      const target = document.getElementById('tab-' + tabName);
      target.style.display = '';
      target.classList.add('active');

      if (tabName === 'dashboard') loadDashboard();
      if (tabName === 'orders') { loadSalespeopleSelect(); loadOrders(); }
      if (tabName === 'salespeople') loadSalespeopleList();
    }

    // ========== 初始化 ==========
    async function init() {
      const user = Auth.getUser();
      document.getElementById('userName').textContent = user.full_name || user.email;
      document.getElementById('userRole').textContent = App.getRoleName(user.role);

      // 默认填今天日期
      document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];

      await loadDashboard();
    }

    // ========== Dashboard 数据概览 ==========
    async function loadDashboard() {
      const stats = await API.getOrderStats();

      document.querySelector('.stat-total .stat-number').textContent = stats.total;
      document.querySelector('.stat-pending .stat-number').textContent = stats.by_status['调货中'] || 0;
      document.querySelector('.stat-transit .stat-number').textContent = stats.by_status['路途中'] || 0;
      document.querySelector('.stat-arrived .stat-number').textContent = stats.by_status['已到货'] || 0;
      document.querySelector('.stat-completed .stat-number').textContent = stats.by_status['已完结'] || 0;
      document.querySelector('.stat-users .stat-number').textContent = stats.by_sales.length;

      const container = document.getElementById('salesStatsContainer');
      if (!stats.by_sales || stats.by_sales.length === 0) {
        App.showEmpty(container, '暂无业务员数据，请先添加业务员');
        return;
      }

      let html = `
        <div class="table-wrapper">
          <table>
            <thead><tr><th>业务员姓名</th><th>订单数量</th></tr></thead>
            <tbody>`;
      stats.by_sales.forEach(s => {
        html += `<tr>
          <td><strong>${App.escapeHtml(s.name)}</strong></td>
          <td><span class="status-badge" style="background:#667eea;color:white;padding:2px 10px;border-radius:10px;">${s.order_count}</span></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    // ========== 订单管理 ==========

    // 加载业务员下拉选项（用于新建订单）
    async function loadSalespeopleSelect() {
      const { data, error } = await API.getSalespeople();
      const select = document.getElementById('salespersonName');
      const filterSelect = document.getElementById('filterSalesperson');

      let options = '<option value="">请选择业务员</option>';
      let filterOptions = '<option value="">全部业务员</option>';

      if (data && data.length > 0) {
        data.forEach(sp => {
          options += `<option value="${App.escapeHtml(sp.name)}">${App.escapeHtml(sp.name)}</option>`;
          filterOptions += `<option value="${App.escapeHtml(sp.name)}">${App.escapeHtml(sp.name)}</option>`;
        });
      } else {
        options = '<option value="">暂无业务员（请先在「业务员管理」中添加）</option>';
      }

      select.innerHTML = options;
      filterSelect.innerHTML = filterOptions;
    }

    async function loadOrders() {
      const container = document.getElementById('ordersContainer');
      App.showLoading(container);

      const filters = {};
      const statusFilter = document.getElementById('filterStatus').value;
      const spFilter = document.getElementById('filterSalesperson').value;
      if (statusFilter) filters.order_status = statusFilter;
      if (spFilter) filters.salesperson_name = spFilter;

      const { data, error } = await API.getOrders(filters);

      if (error) {
        App.showError(container, '加载订单失败: ' + error.message);
        return;
      }
      if (!data || data.length === 0) {
        App.showEmpty(container, '暂无订单数据');
        return;
      }

      renderOrders(data);
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');
      let html = `
        <div class="table-wrapper" style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>发票号</th><th>单据日期</th><th>品牌</th><th>产品型号</th>
                <th>数量</th><th>交期</th><th>状态</th>
                <th>业务员</th><th>发货时间</th><th>快递单号</th>
                <th>仓库备注</th><th>业务备注</th><th>创建时间</th><th>操作</th>
              </tr>
            </thead>
            <tbody>`;

      orders.forEach(order => {
        const statusClass = {
          '调货中': 'status-pending',
          '路途中': 'status-transit',
          '已到货': 'status-arrived',
          '已完结': 'status-completed'
        }[order.order_status] || '';

        html += `<tr data-id="${order.id}">
          <td><strong>${App.escapeHtml(order.invoice_no)}</strong></td>
          <td>${order.order_date || '-'}</td>
          <td>${App.escapeHtml(order.brand || '-')}</td>
          <td>${App.escapeHtml(order.product_model)}</td>
          <td>${order.quantity}</td>
          <td>${order.delivery_date || '-'}</td>
          <td>
            <select class="form-control status-select" onchange="updateStatus(${order.id}, this.value)" style="width:110px;">
              ${CONFIG.ORDER_STATUSES.map(s =>
                `<option value="${s}" ${s === order.order_status ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>
          </td>
          <td>${App.escapeHtml(order.salesperson_name || '-')}</td>
          <td>${order.shipping_date || '-'}</td>
          <td>${App.escapeHtml(order.tracking_no || '-')}</td>
          <td>
            <input type="text" class="notes-input warehouse-notes"
              value="${App.escapeHtml(order.warehouse_notes || '')}"
              onblur="updateWarehouseNotes(${order.id}, this.value)" placeholder="仓库填写">
          </td>
          <td>
            <input type="text" class="notes-input sales-notes"
              value="${App.escapeHtml(order.sales_notes || '')}"
              onblur="updateSalesNotes(${order.id}, this.value)" placeholder="业务备注">
          </td>
          <td style="white-space:nowrap;font-size:12px;color:#999;">${App.formatDate(order.created_at)}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteOrder(${order.id})">删除</button>
          </td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    // 新增订单（增强版）
    document.getElementById('addOrderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const invoiceNo = document.getElementById('invoiceNo').value.trim();
      const orderDate = document.getElementById('orderDate').value;
      const brand = document.getElementById('brand').value.trim();
      const productModel = document.getElementById('productModel').value.trim();
      const quantity = parseInt(document.getElementById('quantity').value);
      const deliveryDate = document.getElementById('deliveryDate').value;
      const salespersonName = document.getElementById('salespersonName').value;
      const salesNotes = document.getElementById('salesNotes').value.trim();

      if (!invoiceNo || !productModel || !quantity || !salespersonName) {
        showToast('请填写所有必填字段（带*号）', 'error');
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      setBtnLoading(btn, true, '添加中...');

      const { error } = await API.createOrder({
        invoice_no: invoiceNo,
        order_date: orderDate,
        brand: brand,
        product_model: productModel,
        quantity,
        delivery_date: deliveryDate,
        salesperson_name: salespersonName,
        sales_notes: salesNotes
      });

      setBtnLoading(btn, false, '添加订单');

      if (error) {
        showToast('添加失败: ' + error.message, 'error');
        return;
      }

      showToast('✅ 订单添加成功！', 'success');
      e.target.reset();
      document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
      await loadOrders();
    });

    // ========== 业务员管理 ==========
    async function loadSalespeopleList() {
      const container = document.getElementById('spContainer');
      App.showLoading(container);

      const { data, error } = await API.getAllSalespeople(true); // 包含已停用的

      if (error) {
        App.showError(container, '加载业务员失败: ' + error.message);
        return;
      }
      if (!data || data.length === 0) {
        App.showEmpty(container, '暂无业务员，请在上方添加');
        return;
      }

      renderSalespeople(data);
    }

    function renderSalespeople(list) {
      const container = document.getElementById('spContainer');
      let html = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>业务员姓名</th><th>状态</th><th>创建时间</th><th>操作</th>
              </tr>
            </thead>
            <tbody>`;

      list.forEach(sp => {
        const isActive = sp.is_active !== false;
        html += `<tr data-id="${sp.id}">
          <td>
            <input type="text" class="inline-edit" id="spname-${sp.id}"
              value="${App.escapeHtml(sp.name)}"
              style="width:150px;padding:4px 8px;border:1px solid #ddd;border-radius:4px;"
              ${!isActive ? 'disabled' : ''}>
          </td>
          <td>
            <span class="status-badge" style="
              background:${isActive ? '#e8f5e9' : '#fff3e0'};
              color:${isActive ? '#2e7d32' : '#e65100'};
              padding:2px 10px;border-radius:10px;font-size:12px;">
              ${isActive ? '✅ 正常' : '⛔ 已停用'}
            </span>
          </td>
          <td style="font-size:12px;color:#999;">${App.formatDate(sp.created_at)}</td>
          <td>
            ${isActive
              ? `<button class="btn btn-sm btn-primary" style="font-size:11px;padding:4px 10px;" onclick="saveSpName(${sp.id})">保存改名</button>
                 <button class="btn btn-sm btn-danger" style="font-size:11px;padding:4px 10px;" onclick="removeSp(${sp.id})">停用</button>`
              : `<span style="color:#999;font-size:12px;">已停用</span>`
            }
          </td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    // 添加业务员
    document.getElementById('addSalespersonForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('newSpName').value.trim();

      if (!name) {
        showToast('请输入业务员姓名', 'error');
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      setBtnLoading(btn, true, '添加中...');

      const { data, error } = await API.addSalesperson(name);

      setBtnLoading(btn, false, '添加业务员');

      if (error) {
        if (error.message && error.message.includes('unique')) {
          showToast('该业务员姓名已存在', 'error');
        } else {
          showToast('添加失败: ' + error.message, 'error');
        }
        return;
      }

      showToast(`✅ 业务员「${name}」已添加！`, 'success');
      e.target.reset();
      await loadSalespeopleList();
    });

    // 保存业务员改名
    async function saveSpName(id) {
      const input = document.getElementById('spname-' + id);
      const newName = input.value.trim();

      if (!newName) {
        showToast('姓名不能为空', 'error');
        return;
      }

      const { error } = await API.updateSalesperson(id, { name: newName });

      if (error) {
        if (error.message && error.message.includes('unique')) {
          showToast('该名称已被使用', 'error');
        } else {
          showToast('保存失败: ' + error.message, 'error');
        }
        return;
      }

      showToast('✅ 姓名已更新', 'success');
      await loadSalespeopleList();
    }

    // 停用业务员（软删除）
    async function removeSp(id) {
      if (!confirm('确定要停用此业务员吗？\n\n⚠️ 停用后不会删除历史订单，但新建订单时不再显示此姓名。')) return;

      const { error } = await API.deleteSalesperson(id);
      if (error) {
        showToast('操作失败: ' + error.message, 'error');
      } else {
        showToast('✅ 已停用', 'success');
        await loadSalespeopleList();
      }
    }

    // ========== 订单操作 ==========
    async function updateStatus(orderId, status) {
      const { error } = await API.updateOrder(orderId, { order_status: status });
      if (error) {
        showToast('更新状态失败: ' + error.message, 'error');
      } else {
        showToast('状态 → ' + status, 'success');
        await loadOrders();
      }
    }

    async function updateWarehouseNotes(orderId, notes) {
      const { error } = await API.updateOrder(orderId, { warehouse_notes: notes });
      if (error) showToast('更新备注失败: ' + error.message, 'error');
    }

    async function updateSalesNotes(orderId, notes) {
      const { error } = await API.updateOrder(orderId, { sales_notes: notes });
      if (error) {
        showToast('更新备注失败: ' + error.message, 'error');
      } else {
        // 不频繁提示
      }
    }

    async function deleteOrder(orderId) {
      if (!confirm('确定要删除此订单吗？此操作不可恢复！')) return;
      const { error } = await API.deleteOrder(orderId);
      if (error) {
        showToast('删除失败: ' + error.message, 'error');
      } else {
        showToast('订单已删除', 'success');
        await loadOrders();
      }
    }

    // ========== 工具函数 ==========
    function setBtnLoading(btn, loading, text) {
      btn.disabled = loading;
      btn.textContent = text;
    }
  </script>
</body>
</html>
