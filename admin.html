<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>进度回复系统 - 管理</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
body{background:#f8f6f2;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.tabs{display:flex;gap:8px;margin:12px 0}
.tab{padding:8px 20px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-size:14px}
.tab.active{background:#e07a5f;color:#fff;border-color:#e07a5f}
.panel{display:none;background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.panel.active{display:block}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.stat{padding:16px 24px;background:#f5f0eb;border-radius:12px;flex:1;min-width:100px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#e07a5f}
.stat .lbl{font-size:12px;color:#888}
table{width:100%;border-collapse:collapse}
th{background:#f5f0eb;padding:8px;font-size:12px;text-align:left;color:#555}
td{padding:8px;font-size:13px;border-bottom:1px solid#f0f0f0}
input,select{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
.btn-danger{background:#e07a5f;color:#fff;border:none}
</style>
</head>
<body>
<div class="header">
<h2>📦 进度回复系统 - 管理</h2>
<div><span id="uname"></span> · <span id="urole"></span> <button class="btn" onclick="Auth.logout()">退出</button></div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('dash')">📊 仪表盘</button>
<button class="tab" onclick="switchTab('orders')">📋 订单新增</button>
<button class="tab" onclick="switchTab('splist')">👥 业务员管理</button>
<button class="tab" onclick="switchTab('users')">🔧 用户管理</button>
</div>

<div id="dash" class="panel active"><div class="stats" id="stats"></div><div id="salesStats"></div></div>

<div id="orders" class="panel">
<h3>新增订单</h3>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
<input id="oi_no" placeholder="到款单号*" required>
<input id="oi_date" type="date">
<input id="oi_model" placeholder="产品型号*" required>
<input id="oi_qty" type="number" placeholder="数量*" required value="1" style="width:80px">
<select id="oi_sp"><option value="">选择业务员</option></select>
<button class="btn btn-danger" onclick="addOrder()">+ 添加订单</button>
</div>
<h3>订单列表</h3>
<table><thead><tr>
<th>到款单号</th><th>日期</th><th>产品</th><th>数量</th><th>业务员</th><th>状态</th><th>预计发货</th><th>进度回复</th><th>操作</th>
</tr></thead><tbody id="otbl"></tbody></table>
</div>

<div id="splist" class="panel">
<h3>业务员管理</h3>
<div style="display:flex;gap:10px;margin-bottom:12px">
<input id="sp_name" placeholder="姓名*">
<input id="sp_code" placeholder="识别码*">
<button class="btn btn-danger" onclick="addSp()">+ 添加</button>
</div>
<table><thead><tr><th>姓名</th><th>识别码</th><th>状态</th><th>操作</th></tr></thead><tbody id="sptbl"></tbody></table>
</div>

<div id="users" class="panel">
<h3>用户管理</h3>
<table><thead><tr><th>邮箱</th><th>角色</th><th>更改角色</th></tr></thead><tbody id="utbl"></tbody></table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/api.js?v=2"></script>
<script>
if(!Auth.requireRole(['admin','super_admin'])){}

async function init(){
  const u=Auth.getUser();
  document.getElementById('uname').textContent=u.full_name||u.email;
  document.getElementById('urole').textContent=Auth.getRoleName(u.role);
  document.getElementById('oi_date').value=new Date().toISOString().split('T')[0];
  await loadSpOptions();
  await loadDash();
  await loadOrders();
  await loadSpList();
  await loadUsers();
  switchTab('dash');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.textContent.includes(
    {dash:'仪表盘',orders:'订单',splist:'业务员',users:'用户'}[t])));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  if(t==='dash') loadDash();
  if(t==='orders') {loadSpOptions();loadOrders();}
  if(t==='splist') loadSpList();
  if(t==='users') loadUsers();
}

async function loadSpOptions(){
  const sps=await API.getSalespeople();
  const sel=document.getElementById('oi_sp');
  sel.innerHTML='<option value="">选择业务员</option>';
  sps.forEach(s=>{sel.innerHTML+=`<option value="${esc(s.name)}">${esc(s.name)}</option>`});
}

async function loadDash(){
  const s=await API.getOrderStats();
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="num">${s.total}</div><div class="lbl">总订单</div></div>
    ${CONFIG.ORDER_STATUSES.map(st=>`<div class="stat"><div class="num">${s.by_status[st]||0}</div><div class="lbl">${st}</div></div>`).join('')}
    <div class="stat"><div class="num">${s.by_sales.length}</div><div class="lbl">业务员数</div></div>`;
  let h='<h4>业务员订单统计</h4><table><tr><th>业务员</th><th>订单数</th></tr>';
  s.by_sales.forEach(x=>{h+=`<tr><td>${esc(x.name)}</td><td>${x.count}</td></tr>`});
  h+='</table>';
  document.getElementById('salesStats').innerHTML=s.by_sales.length?h:'';
}

async function loadOrders(){
  const {data}=await API.getOrders();
  const tb=document.getElementById('otbl');
  if(!data||!data.length){tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:#ccc">暂无</td></tr>';return;}
  let h='';
  data.forEach(o=>{
    h+=`<tr>
      <td><strong>${esc(o.invoice_no)}</strong></td><td>${o.order_date||'-'}</td><td>${esc(o.product_model||'')}</td>
      <td>${o.quantity}</td><td>${esc(o.salesperson_name||'')}</td><td>${o.order_status||'-'}</td>
      <td>${o.shipping_date||'-'}</td><td>${esc(o.warehouse_notes||'').substring(0,15)}</td>
      <td><button class="btn" onclick="delOrder(${o.id})">🗑</button></td></tr>`;
  });
  tb.innerHTML=h;
}

async function addOrder(){
  const r=await API.createOrder({
    invoice_no:document.getElementById('oi_no').value.trim(),
    order_date:document.getElementById('oi_date').value||null,
    product_model:document.getElementById('oi_model').value.trim(),
    quantity:parseInt(document.getElementById('oi_qty').value)||0,
    salesperson_name:document.getElementById('oi_sp').value
  });
  if(r.error)alert('添加失败:'+r.error.message);else{loadOrders();loadDash();}
}

async function delOrder(id){if(confirm('确定删除？')){await API.deleteOrder(id);loadOrders();loadDash();}}

async function loadSpList(){
  const sps=await API.getSalespeople();
  const tb=document.getElementById('sptbl');
  let h='';
  sps.forEach(s=>{
    h+=`<tr>
      <td><input value="${esc(s.name)}" onblur="updSp(${s.id},'name',this.value)" style="width:100px"></td>
      <td><input value="${esc(s.access_code||'')}" onblur="updSp(${s.id},'access_code',this.value.toUpperCase())" style="width:100px"></td>
      <td>${s.is_active?'✅启用':'❌停用'}</td>
      <td><button class="btn" onclick="togSp(${s.id},${!s.is_active})">${s.is_active?'停用':'启用'}</button> <button class="btn btn-danger" onclick="delSp(${s.id})">🗑</button></td></tr>`;
  });
  tb.innerHTML=h||'<tr><td colspan="4">暂无业务员</td></tr>';
}

async function addSp(){
  const n=document.getElementById('sp_name').value.trim();
  const c=document.getElementById('sp_code').value.trim().toUpperCase();
  if(!n||!c)return alert('姓名和识别码必填');
  await API.addSalesperson(n,c);
  loadSpList();loadSpOptions();
}

async function updSp(id,f,v){const u={};u[f]=v;await API.updateSalesperson(id,u);}
async function togSp(id,active){await API.updateSalesperson(id,{is_active:active});loadSpList();}
async function delSp(id){if(confirm('确定删除？')){await API.updateSalesperson(id,{is_active:false});loadSpList();}}

async function loadUsers(){
  const users=await API.getUsers();
  const roles=['admin','warehouse','sales','super_admin'];
  let h='';
  users.forEach(u=>{
    h+=`<tr><td>${esc(u.email)}</td><td>${Auth.getRoleName(u.role)}</td>
      <td><select onchange="updUser('${u.id}',this.value)">${roles.map(r=>`<option value="${r}" ${r===u.role?'selected':''}>${Auth.getRoleName(r)}</option>`).join('')}</select></td></tr>`;
  });
  document.getElementById('utbl').innerHTML=h;
}

async function updUser(id,role){await API.updateUserRole(id,role);loadUsers();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
</body>
</html>
