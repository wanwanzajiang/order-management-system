<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制台 - 进度回复系统</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{font-family:sans-serif;background:#f5f3ee;margin:0}
.header{background:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.header h1{font-size:18px;margin:0}
.container{max-width:1000px;margin:20px auto;padding:0 20px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:12px;padding:16px;text-align:center}
.stat .num{font-size:28px;font-weight:500;color:#e07a5f}
.stat .label{font-size:12px;color:#888;margin-top:4px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
th{background:#f8f7f2}
.loading{text-align:center;padding:40px;color:#999}
</style>
</head>
<body>
<div class="header">
<h1>⚙️ 控制台</h1>
<div style="display:flex;align-items:center;gap:12px">
<span id="userName">-</span>
<a href="admin.html">管理面板</a>
<a href="#" onclick="Auth.logout()" style="font-size:12px;color:#999">退出</a>
</div>
</div>

<div class="container">
<div class="stats">
<div class="stat"><div class="num" id="sTotal">0</div><div class="label">总订单</div></div>
<div class="stat"><div class="num" id="sPending">0</div><div class="label">调货中</div></div>
<div class="stat"><div class="num" id="sTransit">0</div><div class="label">路途中</div></div>
<div class="stat"><div class="num" id="sArrived">0</div><div class="label">已到货</div></div>
<div class="stat"><div class="num" id="sDone">0</div><div class="label">已完结</div></div>
</div>

<div class="card">
<h3>业务员订单统计</h3>
<div id="spStats"></div>
</div>

<div class="card">
<h3>账号管理</h3>
<div id="accountsList"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireRole(['super_admin'])) return;
  init();
});

async function init() {
  const user = Auth.getUser();
  document.getElementById('userName').textContent = user.full_name || user.email;
  await loadStats();
  await loadAccounts();
}

async function loadStats() {
  const stats = await API.getOrderStats();
  document.getElementById('sTotal').textContent = stats.total;
  document.getElementById('sPending').textContent = stats.byStatus['调货中'] || 0;
  document.getElementById('sTransit').textContent = stats.byStatus['路途中'] || 0;
  document.getElementById('sArrived').textContent = stats.byStatus['已到货'] || 0;
  document.getElementById('sDone').textContent = stats.byStatus['已完结'] || 0;

  const sps = stats.bySalesperson.sort((a,b) => b.count - a.count);
  let html = '<table><thead><tr><th>业务员</th><th>订单数</th></tr></thead><tbody>';
  sps.forEach(s => { html += `<tr><td>${s.name}</td><td>${s.count}</td></tr>`; });
  html += '</tbody></table>';
  document.getElementById('spStats').innerHTML = html || '<div class="loading">暂无数据</div>';
}

async function loadAccounts() {
  const { data } = await API.getProfiles();
  if (!data) return;
  let html = '<table><thead><tr><th>邮箱</th><th>角色</th></tr></thead><tbody>';
  data.forEach(p => {
    const rn = { super_admin:'超级管理员', admin:'管理员', warehouse:'仓库', sales:'业务员' }[p.role] || p.role;
    html += `<tr><td>${p.email}</td><td>${rn}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('accountsList').innerHTML = html;
}
</script>
</body>
</html>
