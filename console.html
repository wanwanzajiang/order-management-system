<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>进度回复系统 - 控制台</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
body{background:#f8f6f2;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin:16px 0}
.stat{padding:16px 24px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex:1;min-width:100px;text-align:center}
.stat .num{font-size:32px;font-weight:700;color:#e07a5f}
.stat .lbl{font-size:12px;color:#888}
table{width:100%;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);border-collapse:collapse}
th{background:#f5f0eb;padding:10px;font-size:12px;text-align:left;color:#555}
td{padding:10px;font-size:13px;border-bottom:1px solid #f0f0f0}
</style>
</head>
<body>
<div class="header">
<h2>📦 进度回复系统 - 控制台</h2>
<div><span id="uname"></span> <button class="btn" onclick="Auth.logout()" style="padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer">退出</button></div>
</div>

<div class="stats" id="stats"></div>

<h3>业务员订单排行</h3>
<table><thead><tr><th>业务员</th><th>订单数</th></tr></thead><tbody id="rank"></tbody></table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/api.js?v=2"></script>
<script>
if(!Auth.requireAuth()){}

(async function(){
  const u=Auth.getUser();
  document.getElementById('uname').textContent=(u.full_name||u.email)+' · '+Auth.getRoleName(u.role);

  const s=await API.getOrderStats();
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="num">${s.total}</div><div class="lbl">总订单</div></div>
    ${CONFIG.ORDER_STATUSES.map(st=>`<div class="stat"><div class="num">${s.by_status[st]||0}</div><div class="lbl">${st}</div></div>`).join('')}
    <div class="stat"><div class="num">${s.by_sales.length}</div><div class="lbl">业务员</div></div>`;

  let h='';
  s.by_sales.forEach(x=>{h+=`<tr><td>${esc(x.name)}</td><td><strong>${x.count}</strong></td></tr>`});
  document.getElementById('rank').innerHTML=h||'<tr><td colspan="2">暂无数据</td></tr>';
})();

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
