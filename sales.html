<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 业务员</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📦 订单管理系统 - 业务员</h1>
      <div class="header-info">
        <div class="user-info">
          <span id="userName">业务员</span>
          <span class="role-badge" id="userRole">业务员</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">退出登录</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 查询区域 -->
    <div class="card" style="border-left:4px solid #667eea;">
      <h3 class="card-title">🔍 查询我的订单</h3>

      <div class="filter-bar" style="margin-bottom:0;">
        <label style="font-weight:500;color:#555;">按发票号：</label>
        <input type="text" id="searchInvoice" class="form-control" placeholder="输入发票号搜索" style="width:200px;">
        <label style="font-weight:500;color:#555;margin-left:12px;">按姓名：</label>
        <select id="searchSpName" class="form-control" style="width:auto;min-width:120px;">
          <option value="">全部业务员</option>
        </select>
        <label style="font-weight:500;color:#555;margin-left:12px;">状态：</label>
        <select id="searchStatus" class="form-control" style="width:auto;min-width:120px;">
          <option value="">全部</option>
          <option value="调货中">调货中</option>
          <option value="路途中">路途中</option>
          <option value="已到货">已到货</option>
          <option value="已完结">已完结</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="searchOrders()" style="margin-left:auto;">🔍 搜索</button>
        <button class="btn btn-secondary btn-sm" onclick="resetSearch()">重置</button>
      </div>
    </div>

    <!-- 结果区域 -->
    <div id="resultContainer"></div>
  </main>

  <footer class="footer">
    © <span id="footerYear"></span> 订单管理系统
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    if (!Auth.requireRole([CONFIG.ROLES.SALES, CONFIG.ROLES.ADMIN, CONFIG.ROLES.WAREHOUSE])) {
      // 已重定向
    } else {
      init();
    }

    async function init() {
      const user = Auth.getUser();
      document.getElementById('userName').textContent = user.full_name || user.email;
      document.getElementById('userRole').textContent = App.getRoleName(user.role);

      await loadSalespeopleOptions();
      showWelcome();
    }

    async function loadSalespeopleOptions() {
      const { data } = await API.getSalespeople();
      const sel = document.getElementById('searchSpName');
      if (data && data.length > 0) {
        data.forEach(sp => {
          sel.innerHTML += `<option value="${App.escapeHtml(sp.name)}">${App.escapeHtml(sp.name)}</option>`;
        });
      }
    }

    function showWelcome() {
      const container = document.getElementById('resultContainer');
      container.innerHTML = `
        <div class="card" style="margin-top:20px;text-align:center;padding:40px 20px;background:#f8f9ff;border-radius:10px;border:2px dashed #ccc;">
          <p style="font-size:40px;margin-bottom:16px;">📋</p>
          <h3 style="color:#555;margin-bottom:8px;">输入条件查询订单</h3>
          <p style="color:#999;font-size:14px;">可以按发票号、业务员姓名、订单状态筛选</p>
          <p style="color:#bbb;font-size:12px;margin-top:12px;">💡 多个条件可组合使用</p>
        </div>`;
    }

    async function searchOrders() {
      const container = document.getElementById('resultContainer');
      App.showLoading(container);

      let query = SUPABASE
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

      const invoiceNo = document.getElementById('searchInvoice').value.trim();
      const spName = document.getElementById('searchSpName').value;
      const status = document.getElementById('searchStatus').value;

      if (invoiceNo) query = query.ilike('invoice_no', `%${invoiceNo}%`);
      if (spName) query = query.eq('salesperson_name', spName);
      if (status) query = query.eq('order_status', status);

      const { data, error } = await query;

      if (error) {
        App.showError(container, '查询失败: ' + error.message);
        return;
      }
      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="card" style="margin-top:20px;text-align:center;padding:30px;">
            <p style="font-size:36px;margin-bottom:8px;">🔍</p>
            <p style="color:#999;">没有找到匹配的订单</p>
            <p style="color:#bbb;font-size:12px;margin-top:4px;">试试更换搜索条件？</p>
          </div>`;
        return;
      }

      renderResults(data);
    }

    function renderResults(orders) {
      const container = document.getElementById('resultContainer');

      // 统计信息
      const totalQty = orders.reduce((sum, o) => sum + (o.quantity || 0), 0);
      const statusCount = {};
      orders.forEach(o => { statusCount[o.order_status] = (statusCount[o.order_status] || 0) + 1; });

      let html = `
        <div class="card" style="margin-top:20px;">
          <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:#f8f9ff;border-radius:8px;">
            <span style="font-size:15px;">📊 找到 <strong style="color:#667eea;font-size:18px;">${orders.length}</strong> 条订单</span>
            <span style="font-size:15px;">📦 总数量：<strong style="color:#e67e22;font-size:18px;">${totalQty}</strong></span>
            ${Object.entries(statusCount).map(([s, c]) =>
              `<span style="font-size:13px;color:#888;">${s}: <strong>${c}</strong></span>`
            ).join('')}
          </div>

          <div class="table-wrapper" style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>发票号</th><th>单据日期</th><th>品牌</th><th>型号</th>
                  <th>数量</th><th>交期</th><th>业务员</th>
                  <th>状态</th><th>发货时间</th><th>快递单号</th>
                  <th>仓库备注</th><th>业务备注</th><th>创建时间</th>
                </tr>
              </thead>
              <tbody>`;

      orders.forEach(order => {
        const statusBadgeColor = {
          '调货中': '#e67e22',
          '路途中': '#3498db',
          '已到货': '#27ae60',
          '已完结': '#95a5a6'
        }[order.order_status] || '#999';

        html += `<tr>
          <td><strong>${App.escapeHtml(order.invoice_no)}</strong></td>
          <td>${order.order_date || '-'}</td>
          <td>${App.escapeHtml(order.brand || '-')}</td>
          <td>${App.escapeHtml(order.product_model)}</td>
          <td><strong>${order.quantity}</strong></td>
          <td>${order.delivery_date || '-'}</td>
          <td>${App.escapeHtml(order.salesperson_name || '-')}</td>
          <td>
            <span style="
              display:inline-block;padding:2px 10px;border-radius:10px;
              font-size:12px;color:white;background:${statusBadgeColor};">
              ${order.order_status}
            </span>
          </td>
          <td>${order.shipping_date || '<span style="color:#ccc;font-size:11px;">待填写</span>'}</td>
          <td>${order.tracking_no ? App.escapeHtml(order.tracking_no) : '<span style="color:#ccc;font-size:11px;">待填写</span>'}</td>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
              title="${App.escapeHtml(order.warehouse_notes || '')}">${App.escapeHtml(order.warehouse_notes || '-')}</td>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
              title="${App.escapeHtml(order.sales_notes || '')}">${App.escapeHtml(order.sales_notes || '-')}</td>
          <td style="white-space:nowrap;font-size:12px;color:#999;">${App.formatDate(order.created_at)}</td>
        </tr>`;
      });

      html += '</tbody></table></div></div>';
      container.innerHTML = html;
    }

    function resetSearch() {
      document.getElementById('searchInvoice').value = '';
      document.getElementById('searchSpName').value = '';
      document.getElementById('searchStatus').value = '';
      showWelcome();
    }
  </script>
</body>
</html>
