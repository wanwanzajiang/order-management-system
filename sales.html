<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进度回复 - 业务员</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{font-family:sans-serif;background:#f5f3ee;margin:0}
.header{background:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.header h1{font-size:18px;margin:0}
.container{max-width:900px;margin:20px auto;padding:0 20px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal-box{background:#fff;border-radius:16px;padding:30px;width:90%;max-width:400px;text-align:center}
.modal-box h2{margin:0 0 16px;font-size:18px}
.modal-box input{padding:10px;border:2px solid #ddd;border-radius:8px;font-size:16px;text-align:center;width:160px;letter-spacing:4px}
.modal-box button{margin-top:12px;padding:10px 30px;background:#e07a5f;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}
.modal-box .err{color:#e24b4a;font-size:13px;margin-top:8px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid #e07a5f}
.card h4{margin:0 0 8px;font-size:15px}
.card p{margin:4px 0;font-size:13px;color:#555}
.filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.loading{text-align:center;padding:40px;color:#999}
.empty{text-align:center;padding:40px;color:#bbb}
.toast{position:fixed;top:20px;right:20px;padding:10px 20px;border-radius:8px;color:#fff;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:#27ae60}
.toast-error{background:#e24b4a}
</style>
</head>
<body>
<div class="header">
<h1>📦 进度回复系统 - 业务员</h1>
<div id="spBadge" style="font-size:13px;color:#888"></div>
</div>

<div class="container">
<div class="filter">
<input id="searchInvoice" placeholder="到款单号搜索" style="padding:6px 12px;border:1px solid #ddd;border-radius:8px;width:180px">
<select id="searchStatus" onchange="doSearch()">
<option value="">全部状态</option>
<option>调货中</option><option>路途中</option><option>已到货</option><option>已完结</option>
</select>
<button class="btn" style="background:#e07a5f;color:#fff;padding:6px 16px;border:none;border-radius:8px;cursor:pointer" onclick="doSearch()">查询</button>
</div>
<div id="resultList"></div>
</div>

<div class="modal" id="codeModal">
<div class="modal-box">
<h2>🔐 验证身份</h2>
<p style="color:#888;font-size:13px;margin:0 0 12px">请输入业务员识别码</p>
<input type="text" id="codeInput" placeholder="XXXXXX" maxlength="10" autofocus>
<div class="err" id="codeError"></div>
<button onclick="verifyCode()">确认</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
let currentSp = null;
document.addEventListener('DOMContentLoaded', () => { showCodeModal(); });
document.addEventListener('keydown', e => { if (e.key==='Enter' && document.getElementById('codeModal').style.display!=='none') verifyCode(); });

function showCodeModal() {
  document.getElementById('codeModal').style.display = 'flex';
  document.getElementById('codeInput').value = '';
  document.getElementById('codeError').textContent = '';
}

async function verifyCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const errEl = document.getElementById('codeError');
  if (!code) { errEl.textContent = '请输入识别码'; return; }
  const { data, error } = await SUPABASE.from('salespeople').select('*').eq('access_code', code).maybeSingle();
  if (error || !data) { errEl.textContent = '识别码错误'; return; }
  if (!data.is_active) { errEl.textContent = '该业务员已被停用'; return; }
  currentSp = data;
  document.getElementById('codeModal').style.display = 'none';
  document.getElementById('spBadge').textContent = '👤 ' + data.name + ' | ' + data.access_code;
  await doSearch();
}

async function doSearch() {
  if (!currentSp) { showCodeModal(); return; }
  const container = document.getElementById('resultList');
  container.innerHTML = '<div class="loading">加载中...</div>';
  const inv = document.getElementById('searchInvoice').value.trim();
  const status = document.getElementById('searchStatus').value;
  const filters = { sp: currentSp.name };
  if (status) filters.status = status;
  if (inv) filters.invoice = inv;
  const { data, error } = await API.getOrders(filters);
  if (error) { container.innerHTML = '<div class="empty">加载失败</div>'; return; }
  if (!data || data.length === 0) { container.innerHTML = '<div class="empty">暂无订单</div>'; return; }

  let html = '';
  data.forEach(o => {
    const sc = { '调货中': '#e67e22', '路途中': '#3498db', '已到货': '#27ae60', '已完结': '#95a5a6' }[o.order_status] || '#999';
    html += `<div class="card" style="border-left-color:${sc}">
      <h4>${o.invoice_no} <span style="color:${sc};font-size:13px;font-weight:normal">[${o.order_status||'-'}]</span></h4>
      <p>📦 ${o.product_model || '-'} × ${o.quantity||'-'} | 📅 ${o.order_date||'-'}</p>
      <p>🚚 预计发货：${o.shipping_date || '待填写'} | 📝 ${o.warehouse_notes || '-'}</p>
    </div>`;
  });
  container.innerHTML = html;
}
</script>
</body>
</html>
