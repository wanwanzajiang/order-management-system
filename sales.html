<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>进度回复系统 - 业务员</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
body{background:#f8f6f2;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:20px}
.login-box{max-width:400px;margin:60px auto;background:#fff;padding:30px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center}
.order-card{background:#fff;padding:16px;margin:10px 0;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.status{display:inline-block;padding:3px 10px;border-radius:8px;color:#fff;font-size:12px;font-weight:600}
.field-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px dashed #eee}
.search-bar{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
input,select{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
.btn-primary{background:#e07a5f;color:#fff;border:none}
</style>
</head>
<body>
<div id="loginPanel" class="login-box">
<h2>📦 业务员登录</h2>
<p style="color:#888;font-size:13px">请输入识别码</p>
<input id="code" placeholder="识别码" style="width:200px;text-align:center;font-size:18px;letter-spacing:3px">
<button class="btn btn-primary" onclick="login()" style="margin-top:10px">进入</button>
<p id="loginErr" style="color:#e74c3c;font-size:13px;display:none"></p>
</div>

<div id="mainPanel" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center">
<h2>📦 进度回复系统 - 业务员</h2>
<div><span id="spname"></span> <button class="btn" onclick="doLogout()">退出</button></div>
</div>
<div class="search-bar">
<select id="fStatus" onchange="search()"><option value="">全部状态</option></select>
<input id="fInvoice" placeholder="搜索到款单号" onkeyup="if(event.key==='Enter')search()">
<button class="btn btn-primary" onclick="search()">🔍 搜索</button>
</div>
<div id="result"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/api.js?v=2"></script>
<script>
let currentSp = null;
const STATUSES = ['调货中','路途中','已到货','已完结'];

(async function(){
  // 填充状态选项
  const fs = document.getElementById('fStatus');
  STATUSES.forEach(s => { fs.innerHTML += `<option value="${s}">${s}</option>` });
})();

async function login(){
  const code = document.getElementById('code').value.trim().toUpperCase();
  if(!code) return;
  const sps = await API.getSalespeople();
  // 也查不活跃的
  const { data: all } = await SUPABASE.from('salespeople').select('*');
  const sp = (all||[]).find(s => s.access_code === code);
  if(!sp){ document.getElementById('loginErr').style.display='block'; document.getElementById('loginErr').textContent='识别码错误'; return; }
  if(!sp.is_active){ document.getElementById('loginErr').style.display='block'; document.getElementById('loginErr').textContent='账号已停用'; return; }
  currentSp = sp;
  document.getElementById('loginPanel').style.display='none';
  document.getElementById('mainPanel').style.display='block';
  document.getElementById('spname').textContent = sp.name;
  await search();
}

function doLogout(){ currentSp=null; document.getElementById('loginPanel').style.display='block'; document.getElementById('mainPanel').style.display='none'; }

async function search(){
  if(!currentSp) return;
  const fs = document.getElementById('fStatus').value;
  const fi = document.getElementById('fInvoice').value.trim();
  let q = SUPABASE.from('orders').select('*').order('created_at',{ascending:false});
  if(fi) q = q.ilike('invoice_no',`%${fi}%`);
  else q = q.eq('salesperson_name', currentSp.name);
  if(fs) q = q.eq('order_status', fs);
  const { data } = await q;
  render(data||[]);
}

function render(orders){
  const r = document.getElementById('result');
  if(!orders.length){ r.innerHTML='<p style="text-align:center;color:#ccc;padding:40px">暂无订单</p>'; return; }
  const sc = {'调货中':'#e67e22','路途中':'#3498db','已到货':'#27ae60','已完结':'#95a5a6'};
  let h = `<p>📊 找到 <strong>${orders.length}</strong> 条订单 · 总数量：<strong>${orders.reduce((s,o)=>s+(o.quantity||0),0)}</strong></p>`;
  orders.forEach(o => {
    h += `<div class="order-card">
      <div class="card-header">
        <div><strong>${esc(o.invoice_no)}</strong> <small>${o.order_date||'-'}</small></div>
        <span class="status" style="background:${sc[o.order_status]||'#ccc'}">${o.order_status||'-'}</span>
      </div>
      <div>📦 ${esc(o.product_model||'')} × ${o.quantity} | 🚚 预计发货：${o.shipping_date||'待定'} | 📝 进度：${esc(o.warehouse_notes||'-').substring(0,20)}</div>`;

    if(o.order_status === '已到货'){
      h += `<div class="field-row">
        <label>是否带来：<select onchange="upd(${o.id},'bring_goods',this.value)" style="font-size:12px">
          <option value="">-</option><option value="true" ${o.bring_goods===true?'selected':''}>是</option><option value="false" ${o.bring_goods===false?'selected':''}>否</option></select></label>
        <label>拍照：<select onchange="upd(${o.id},'photo_request',this.value)" style="font-size:12px">
          <option value="false" ${!o.photo_request?'selected':''}>不需要</option><option value="true" ${o.photo_request?'selected':''}>需要</option></select></label>
        <label>验货：<input type="date" value="${o.inspection_date||''}" onchange="upd(${o.id},'inspection_date',this.value)" style="width:120px;font-size:12px"></label>
        <label>收回：<input type="date" value="${o.return_date||''}" onchange="upd(${o.id},'return_date',this.value)" style="width:120px;font-size:12px"></label>
      </div>`;
    }
    h += '</div>';
  });
  r.innerHTML = h;
}

async function upd(id, field, value){
  const u = {}; u[field] = value === '' || value === null || value === 'null' ? null : (value==='true'?true:value==='false'?false:value);
  await API.updateOrder(id, u);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
