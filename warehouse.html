<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 仓库人员</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📦 订单管理系统 - 仓库人员</h1>
      <div class="header-info">
        <div class="user-info">
          <span id="userName">仓库人员</span>
          <span class="role-badge" id="userRole">仓库人员</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">退出登录</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h3 class="card-title">📋 全部订单</h3>
      <div class="filter-bar">
        <label>筛选状态：</label>
        <select id="filterStatus" class="form-control" style="width:auto;min-width:140px;" onchange="loadOrders()">
          <option value="">全部状态</option>
          <option value="调货中">调货中</option>
          <option value="路途中">路途中</option>
          <option value="已到货">已到货</option>
          <option value="已完结">已完结</option>
        </select>
      </div>
      <div id="ordersContainer">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    © <span id="footerYear"></span> 订单管理系统
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    if (!Auth.requireRole([CONFIG.ROLES.WAREHOUSE])) {
      // 已重定向
    } else {
      init();
    }

    async function init() {
      const user = Auth.getUser();
      document.getElementById('userName').textContent = user.full_name || user.email;
      document.getElementById('userRole').textContent = App.getRoleName(user.role);
      await loadOrders();
    }

    async function loadOrders() {
      const container = document.getElementById('ordersContainer');
      App.showLoading(container);

      const filters = {};
      const statusFilter = document.getElementById('filterStatus').value;
      if (statusFilter) filters.order_status = statusFilter;

      const { data, error } = await API.getOrders(filters);

      if (error) {
        App.showError(container, '加载订单失败: ' + error.message);
        return;
      }

      if (!data || data.length === 0) {
        App.showEmpty(container, '暂无订单');
        return;
      }

      renderOrders(data);
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');
      let html = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>发票号</th><th>产品型号</th><th>数量</th><th>状态</th>
                <th>仓库备注</th><th>业务员</th><th>创建时间</th><th>操作</th>
              </tr>
            </thead>
            <tbody>`;

      orders.forEach(order => {
        const canDelete = order.order_status === '已完结';
        html += `<tr data-id="${order.id}">
          <td>${App.escapeHtml(order.invoice_no)}</td>
          <td>${App.escapeHtml(order.product_model)}</td>
          <td>${order.quantity}</td>
          <td>
            <select class="form-control status-select" onchange="updateStatus(${order.id}, this.value)" style="width:120px;">
              ${CONFIG.ORDER_STATUSES.map(s =>
                `<option value="${s}" ${s === order.order_status ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>
          </td>
          <td>
            <input type="text" class="notes-input warehouse-notes"
              value="${App.escapeHtml(order.warehouse_notes || '')}"
              onblur="updateWarehouseNotes(${order.id}, this.value)" placeholder="填写仓库备注">
          </td>
          <td>${App.escapeHtml(order.user_profiles?.full_name || '-')}</td>
          <td>${App.formatDate(order.created_at)}</td>
          <td>
            ${canDelete
              ? `<button class="btn btn-danger btn-sm" onclick="deleteOrder(${order.id})">删除</button>`
              : '<span style="color:#ccc;font-size:12px;">仅可删除已完结订单</span>'}
          </td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    async function updateStatus(orderId, status) {
      const { error } = await API.updateOrder(orderId, { order_status: status });
      if (error) {
        showToast('更新状态失败: ' + error.message, 'error');
      } else {
        showToast('状态已更新 → ' + status, 'success');
        await loadOrders();
      }
    }

    async function updateWarehouseNotes(orderId, notes) {
      const { error } = await API.updateOrder(orderId, { warehouse_notes: notes });
      if (error) {
        showToast('更新备注失败: ' + error.message, 'error');
      } else {
        showToast('备注已保存', 'success');
      }
    }

    async function deleteOrder(orderId) {
      if (!confirm('确定要删除此已完结的订单吗？')) return;

      const { error } = await API.deleteOrder(orderId);
      if (error) {
        showToast('删除失败: ' + error.message, 'error');
      } else {
        showToast('订单已删除', 'success');
        await loadOrders();
      }
    }
  </script>
</body>
</html>
