<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进度回复 - 仓库</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{font-family:sans-serif;background:#f5f3ee;margin:0}
.header{background:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.header h1{font-size:18px;margin:0}
.container{max-width:1100px;margin:20px auto;padding:0 20px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
th{background:#f8f7f2;font-weight:500;color:#555}
input,select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.notes-input{width:100%;min-width:100px}
.filter{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.card{background:#fff;border-radius:12px;padding:20px}
.loading{text-align:center;padding:40px;color:#999}
.empty{text-align:center;padding:40px;color:#bbb}
.toast{position:fixed;top:20px;right:20px;padding:10px 20px;border-radius:8px;color:#fff;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:#27ae60}
.toast-error{background:#e24b4a}
</style>
</head>
<body>
<div class="header">
<h1>📦 进度回复系统 - 仓库</h1>
<div style="display:flex;align-items:center;gap:12px">
<span id="userName">-</span>
<span style="background:#e07a5f;color:#fff;padding:2px 10px;border-radius:12px;font-size:12px" id="userRole">-</span>
<a href="#" onclick="Auth.logout()" style="font-size:12px;color:#999">退出</a>
</div>
</div>

<div class="container">
<div class="card">
<h3>📋 订单操作台</h3>
<div class="filter">
<label>状态：</label>
<select id="filterStatus" onchange="loadOrders()">
<option value="">全部</option>
<option>调货中</option><option>路途中</option><option>已到货</option><option>已完结</option>
</select>
<label>业务员：</label>
<select id="filterSp" onchange="loadOrders()"><option value="">全部</option></select>
</div>
<div id="ordersList"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireRole(['warehouse','admin','super_admin'])) return;
  init();
});

async function init() {
  const user = Auth.getUser();
  document.getElementById('userName').textContent = user.full_name || user.email;
  document.getElementById('userRole').textContent = user.role === 'warehouse' ? '仓库人员' : '管理员';
  await loadSpFilter();
  await loadOrders();
}

async function loadSpFilter() {
  const { data } = await API.getSalespeople();
  const sel = document.getElementById('filterSp');
  (data||[]).forEach(s => {
    sel.innerHTML += `<option value="${s.name}">${s.name}</option>`;
  });
}

async function loadOrders() {
  const container = document.getElementById('ordersList');
  container.innerHTML = '<div class="loading">加载中...</div>';
  const status = document.getElementById('filterStatus').value;
  const sp = document.getElementById('filterSp').value;
  const { data, error } = await API.getOrders({ status, sp });
  if (error) { container.innerHTML = '<div class="empty">加载失败: ' + error.message + '</div>'; return; }
  if (!data || data.length === 0) { container.innerHTML = '<div class="empty">暂无订单</div>'; return; }

  const statusIcon = { '调货中': '📦', '路途中': '🚚', '已到货': '✅', '已完结': '🏁' };
  const groups = {};
  data.forEach(o => { const s = o.order_status || '(空)'; if (!groups[s]) groups[s] = []; groups[s].push(o); });

  let html = '';
  for (const status of CONFIG.ORDER_STATUSES) {
    if (!groups[status] || groups[status].length === 0) continue;
    html += `<h4 style="margin:16px 0 8px">${statusIcon[status]} ${status} (${groups[status].length})</h4>
    <table><thead><tr>
      <th>到款单号</th><th>日期</th><th>产品</th><th>数量</th><th>业务员</th>
      <th>预计发货</th><th>进度回复</th><th>状态</th>
    </tr></thead><tbody>`;

    groups[status].forEach(o => {
      html += `<tr>
        <td><strong>${o.invoice_no}</strong></td>
        <td>${o.order_date || '-'}</td>
        <td style="max-width:200px;font-size:12px">${o.product_model || '-'}</td>
        <td>${o.quantity || '-'}</td>
        <td>${o.salesperson_name || '-'}</td>
        <td><input type="date" value="${o.shipping_date || ''}" onchange="updateField(${o.id},'shipping_date',this.value)" style="width:130px"></td>
        <td><input type="text" class="notes-input" value="${o.warehouse_notes || ''}" onblur="updateField(${o.id},'warehouse_notes',this.value)" placeholder="进度回复" style="width:160px"></td>
        <td><select onchange="updateField(${o.id},'order_status',this.value)" style="width:90px">
          <option value="">-</option>
          ${CONFIG.ORDER_STATUSES.map(s => `<option value="${s}" ${s===o.order_status?'selected':''}>${s}</option>`).join('')}
        </select></td>
      </tr>`;
    });
    html += '</tbody></table>';
  }
  container.innerHTML = html;
}

async function updateField(id, field, value) {
  const upd = {};
  upd[field] = value || null;
  await API.updateOrder(id, upd);
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'success');
  el.textContent = msg; document.body.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2500);
}
</script>
</body>
</html>
