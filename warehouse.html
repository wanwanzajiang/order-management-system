<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 仓库</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📦 订单管理系统 - 仓库</h1>
      <div class="header-info">
        <div class="user-info">
          <span id="userName">仓库人员</span>
          <span class="role-badge" id="userRole">仓库</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">退出登录</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h3 class="card-title">📋 全部订单 · 仓库操作台</h3>

      <!-- 筛选栏 -->
      <div class="filter-bar">
        <label style="font-weight:500;color:#555;">状态筛选：</label>
        <select id="filterStatus" class="form-control" style="width:auto;min-width:140px;" onchange="loadOrders()">
          <option value="">全部状态</option>
          <option value="调货中" selected>调货中（优先处理）</option>
          <option value="路途中">路途中</option>
          <option value="已到货">已到货</option>
          <option value="已完结">已完结</option>
        </select>
        <label style="font-weight:500;color:#555;margin-left:12px;">业务员：</label>
        <select id="filterSp" class="form-control" style="width:auto;min-width:120px;" onchange="loadOrders()">
          <option value="">全部</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadOrders()" style="margin-left:auto;">🔄 刷新</button>
      </div>

      <p style="font-size:13px;color:#888;margin-bottom:12px;">
        💡 你的权限：更新订单状态、填写<span style="color:#e07a5f;font-weight:600;">发货时间</span>和<span style="color:#e07a5f;font-weight:600;">快递单号</span>、添加仓库备注
      </p>

      <div id="ordersContainer">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    © <span id="footerYear"></span> 订单管理系统
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    if (!Auth.requireRole([CONFIG.ROLES.WAREHOUSE, CONFIG.ROLES.ADMIN])) {
      // 已重定向
    } else {
      init();
    }

    async function init() {
      const user = Auth.getUser();
      document.getElementById('userName').textContent = user.full_name || user.email;
      document.getElementById('userRole').textContent = App.getRoleName(user.role);
      await loadSalespeopleFilter();
      await loadOrders(); // 默认显示"调货中"
    }

    async function loadSalespeopleFilter() {
      const { data } = await API.getSalespeople();
      const sel = document.getElementById('filterSp');
      if (data && data.length > 0) {
        data.forEach(sp => {
          sel.innerHTML += `<option value="${App.escapeHtml(sp.name)}">${App.escapeHtml(sp.name)}</option>`;
        });
      }
    }

    async function loadOrders() {
      const container = document.getElementById('ordersContainer');
      App.showLoading(container);

      let query = SUPABASE
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

      const statusFilter = document.getElementById('filterStatus').value;
      const spFilter = document.getElementById('filterSp').value;
      if (statusFilter) query = query.eq('order_status', statusFilter);
      if (spFilter) query = query.eq('salesperson_name', spFilter);

      const { data, error } = await query;

      if (error) {
        App.showError(container, '加载订单失败: ' + error.message);
        return;
      }
      if (!data || data.length === 0) {
        App.showEmpty(container, '暂无订单数据');
        return;
      }

      renderOrders(data);
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');

      // 按状态分组
      const groups = {};
      orders.forEach(o => {
        const s = o.order_status;
        if (!groups[s]) groups[s] = [];
        groups[s].push(o);
      });

      const statusIcon = { '调货中': '📦', '路途中': '🚚', '已到货': '✅', '已完结': '🏁' };

      let html = '';
      for (const status of CONFIG.ORDER_STATUSES) {
        if (!groups[status] || groups[status].length === 0) continue;

        html += `<div class="card" style="margin-bottom:16px;border-left:4px solid ${
          status === '调货中' ? '#e67e22' : status === '路途中' ? '#3498db' : status === '已到货' ? '#27ae60' : '#95a5a6'
        };padding:16px;">
          <h4 style="margin:0 0 12px 0;">${statusIcon[status]} ${status} (${groups[status].length})</h4>
          <div class="table-wrapper" style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>发票号</th><th>单据日期</th><th>品牌</th><th>型号</th>
                  <th>数量</th><th>交期</th><th>业务员</th>
                  <th style="color:#e07a5f;font-weight:600;">📅 发货时间</th>
                  <th style="color:#e07a5f;font-weight:600;">📦 快递单号</th>
                  <th>仓库备注</th><th>操作</th>
                </tr>
              </thead>
              <tbody>`;

        groups[status].forEach(order => {
          html += `<tr data-id="${order.id}">
            <td><strong>${App.escapeHtml(order.invoice_no)}</strong></td>
            <td>${order.order_date || '-'}</td>
            <td>${App.escapeHtml(order.brand || '-')}</td>
            <td>${App.escapeHtml(order.product_model)}</td>
            <td>${order.quantity}</td>
            <td>${order.delivery_date || '-'}</td>
            <td>${App.escapeHtml(order.salesperson_name || '-')}</td>
            <td>
              <input type="date" class="form-control ship-date"
                value="${order.shipping_date || ''}"
                onchange="updateShipping(${order.id}, this.value)"
                style="width:150px;padding:4px 6px;font-size:13px;"
                title="由仓库填写实际发货时间">
            </td>
            <td>
              <input type="text" class="form-control tracking-input"
                value="${App.escapeHtml(order.tracking_no || '')}"
                onblur="updateTracking(${order.id}, this.value)"
                placeholder="填写快递单号"
                style="width:150px;padding:4px 6px;font-size:13px;"
                title="由仓库填写快递/物流单号">
            </td>
            <td>
              <input type="text" class="notes-input warehouse-notes"
                value="${App.escapeHtml(order.warehouse_notes || '')}"
                onblur="updateWarehouseNotes(${order.id}, this.value)" placeholder="仓库备注">
            </td>
            <td>
              <select class="form-control status-select" onchange="updateStatus(${order.id}, this.value)" style="width:110px;">
                ${CONFIG.ORDER_STATUSES.map(s =>
                  `<option value="${s}" ${s === order.order_status ? 'selected' : ''}>${s}</option>`
                ).join('')}
              </select>
            </td>
          </tr>`;
        });

        html += '</tbody></table></div></div>';
      }

      container.innerHTML = html || '<p style="text-align:center;color:#999;padding:30px;">暂无匹配的订单</p>';
    }

    // ========== 仓库专属操作 ==========

    async function updateStatus(id, status) {
      showToast('更新中...', '');
      const { error } = await API.updateOrder(id, { order_status: status });
      if (error) {
        showToast('更新失败: ' + error.message, 'error');
      } else {
        showToast(`✅ 状态 → ${status}`, 'success');
        setTimeout(() => loadOrders(), 500);
      }
    }

    async function updateShipping(id, dateVal) {
      const { error } = await API.updateOrder(id, { shipping_date: dateVal || null });
      if (error) showToast('保存发货时间失败: ' + error.message, 'error');
      else console.log('[Warehouse] 发货时间已更新:', dateVal);
    }

    async function updateTracking(id, noVal) {
      const { error } = await API.updateOrder(id, { tracking_no: noVal.trim() || null });
      if (error) showToast('保存单号失败: ' + error.message, 'error');
      else console.log('[Warehouse] 快递单号已更新:', noVal);
    }

    async function updateWarehouseNotes(id, notes) {
      const { error } = await API.updateOrder(id, { warehouse_notes: notes });
      if (error) showToast('备注保存失败: ' + error.message, 'error');
    }
  </script>
</body>
</html>
