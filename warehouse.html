<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>进度回复系统 - 仓库</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
body{background:#f8f6f2;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:12px 0}
select,input[type=date],input[type=text]{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
.btn-primary{background:#e07a5f;color:#fff;border:none}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
th{background:#f5f0eb;padding:10px 8px;font-size:12px;text-align:left;font-weight:600;color:#555}
td{padding:8px;font-size:13px;border-bottom:1px solid #f0f0f0}
.file-btn{padding:4px 8px;border:1px solid #c0dd97;border-radius:8px;background:#f9fdf7;color:#3b6d11;cursor:pointer;font-size:11px}
</style>
</head>
<body>
<div class="header">
<h2>📦 进度回复系统 - 仓库</h2>
<div><span id="uname"></span> · <span id="urole"></span> <button class="btn" onclick="Auth.logout()">退出</button></div>
</div>

<div class="filter-bar">
<label>状态：</label>
<select id="fs" onchange="load()"><option value="">全部</option></select>
<label>业务员：</label>
<select id="fsp" onchange="load()"><option value="">全部</option></select>
<button class="btn btn-primary" onclick="load()">🔄 刷新</button>
</div>

<table id="tbl"><thead><tr>
<th>到款单号</th><th>日期</th><th>产品型号</th><th>数量</th><th>业务员</th>
<th>状态</th><th>预计发货</th><th>进度回复</th>
<th>拍照</th><th>带来</th><th>验货</th><th>收回</th><th>操作</th>
</tr></thead><tbody id="tbdy"><tr><td colspan="13" style="text-align:center;color:#ccc;padding:30px">加载中...</td></tr></tbody></table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/api.js?v=2"></script>
<script>
if(!Auth.requireRole(['warehouse','admin','super_admin'])){}

const STATUSES = ['调货中','路途中','已到货','已完结'];
let currentRole = '';

async function init(){
  const u = Auth.getUser();
  currentRole = u.role;
  document.getElementById('uname').textContent = u.full_name||u.email;
  document.getElementById('urole').textContent = Auth.getRoleName(u.role);

  // 填充状态筛选
  const fs = document.getElementById('fs');
  STATUSES.forEach(s => { fs.innerHTML += `<option value="${s}">${s}</option>` });

  // 填充业务员筛选（从订单表取）
  const { data: orders } = await API.getOrders();
  if(orders){
    const names = [...new Set(orders.map(o=>o.salesperson_name).filter(Boolean))].sort();
    const fsp = document.getElementById('fsp');
    names.forEach(n => { fsp.innerHTML += `<option value="${n}">${n}</option>` });
  }
  await load();
}

async function load(){
  const fs = document.getElementById('fs');
  const fsp = document.getElementById('fsp');
  const { data: orders } = await API.getOrders({ status: fs.value, salesperson: fsp.value });
  render(orders||[]);
}

function render(orders){
  const tb = document.getElementById('tbdy');
  if(!orders.length){ tb.innerHTML='<tr><td colspan="13" style="text-align:center;color:#ccc;padding:30px">暂无订单</td></tr>'; return; }

  let h='';
  orders.forEach(o=>{
    h+=`<tr>
      <td><strong>${esc(o.invoice_no)}</strong></td>
      <td>${o.order_date||'-'}</td>
      <td>${esc(o.product_model||'-')}</td>
      <td>${o.quantity||0}</td>
      <td>${esc(o.salesperson_name||'-')}</td>
      <td><select onchange="upd(${o.id},'order_status',this.value)" style="font-size:12px">
        ${STATUSES.map(s=>`<option value="${s}" ${s===o.order_status?'selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><input type="date" value="${o.shipping_date||''}" onchange="upd(${o.id},'shipping_date',this.value)" style="width:130px;font-size:12px"></td>
      <td><input type="text" value="${esc(o.warehouse_notes||'')}" onblur="upd(${o.id},'warehouse_notes',this.value)" placeholder="填写" style="width:100px;font-size:12px"></td>
      <td style="text-align:center">${o.photo_request?'📸':'-'}</td>
      <td>${o.bring_goods===true?'✅':o.bring_goods===false?'❌':'-'}</td>
      <td>${o.inspection_date||'-'}</td>
      <td>${o.return_date||'-'}</td>
      <td></td>
    </tr>`;
  });
  tb.innerHTML = h;
}

async function upd(id, field, value){
  const u={}; u[field]=value||null;
  await API.updateOrder(id, u);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
