<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>进度回复 - 仓库</title>
  <link rel="stylesheet" href="css/style.css?v=1780062020">
  <link rel="stylesheet" href="css/file-panel.css?v=1780062020">
  <style>
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📦 进度回复系统 - 仓库</h1>
      <div class="header-info">
        <div class="user-info">
          <span id="userName">仓库人员</span>
          <span class="role-badge" id="userRole">仓库</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">退出登录</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h3 class="card-title">📋 全部订单 · 仓库操作台</h3>

      <!-- 筛选栏 -->
      <div class="filter-bar">
        <label style="font-weight:500;color:#555;">状态筛选：</label>
        <select id="filterStatus" class="form-control" style="width:auto;min-width:140px;" onchange="loadOrders()">
          <option value="">全部</option>
          <option value="__empty__">📋 待处理</option>
          <option value="调货中">调货中（优先处理）</option>
          <option value="路途中">路途中</option>
          <option value="已到货">已到货</option>
          <option value="已完结">已完结</option>
        </select>
        <label style="font-weight:500;color:#555;margin-left:12px;">业务员：</label>
        <select id="filterSp" class="form-control" style="width:auto;min-width:120px;" onchange="loadOrders()">
          <option value="">全部</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadOrders()" style="margin-left:auto;">🔄 刷新</button>
      </div>

      <p style="font-size:13px;color:#888;margin-bottom:12px;">
        💡 你的权限：更新订单状态、填写<span style="color:#e07a5f;font-weight:600;">预计发货时间</span>、添加进度回复
      </p>

      <div id="ordersContainer">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </main>

  <!-- 文件面板 -->
  <div class="file-overlay" id="filePanelOverlay" onclick="if(event.target===this)FileOps.close()">
    <div class="file-panel">
      <div class="file-header"><h3 id="filePanelTitle">📎 文件</h3><button onclick="FileOps.close()">&times;</button></div>
      <div class="file-body" id="filePanelBody"></div>
    </div>
  </div>

  <footer class="footer">
    © <span id="footerYear"></span> 进度回复系统
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=1780062020"></script>
  <script src="js/auth.js?v=1780062020"></script>
  <script src="js/api.js?v=1780062020"></script>
  <script src="js/app.js?v=1780062020"></script>
  <script src="js/file-ops.js?v=1780062020"></script>

  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    if (!Auth.requireRole([CONFIG.ROLES.WAREHOUSE, CONFIG.ROLES.ADMIN])) {
      // 已重定向
    } else {
      init();
    }

    async function init() {
      const user = Auth.getUser();
      _currentRole = user.role;
      document.getElementById('userName').textContent = user.full_name || user.email;
      document.getElementById('userRole').textContent = App.getRoleName(user.role);
      await loadSalespeopleFilter();
      await loadOrders(); // 默认显示"调货中"
    }

    async function loadSalespeopleFilter() {
      const { data } = await SUPABASE.from('salespeople').select('name').eq('is_active', true).order('name');
      const sel = document.getElementById('filterSp');
      if (data && data.length > 0) {
        data.forEach(sp => {
          sel.innerHTML += `<option value="${App.escapeHtml(sp.name)}">${App.escapeHtml(sp.name)}</option>`;
        });
      }
    }

    let whDateSortAsc = false;
    let _currentRole = '';

    function toggleDateSort() {
      whDateSortAsc = !whDateSortAsc;
      const icon = document.getElementById('whDateSortIcon');
      if (icon) icon.textContent = whDateSortAsc ? '↑ 升序' : '↓ 降序';
      loadOrders();
    }

    async function loadOrders() {
      const container = document.getElementById('ordersContainer');
      App.showLoading(container);

      let query = SUPABASE
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

      const statusFilter = document.getElementById('filterStatus').value;
      const spFilter = document.getElementById('filterSp').value;
      if (statusFilter === '__empty__') {
        query = query.is('order_status', null);
      } else if (statusFilter) {
        query = query.eq('order_status', statusFilter);
      }
      if (spFilter) query = query.eq('salesperson_name', spFilter);

      const { data, error } = await query;

      if (error) {
        App.showError(container, '加载订单失败: ' + error.message);
        return;
      }
      if (!data || data.length === 0) {
        App.showEmpty(container, '暂无订单数据');
        return;
      }

      renderOrders(data);
    }

    function renderOrderRow(order, groupStatus) {
      const productsHtml = renderWarehouseProductDetail(order.product_model);
      const fileBtn = FileOps.renderFileBtn(order, _currentRole);
      return `<tr data-id="${order.id}">
        <td><strong>${App.escapeHtml(order.invoice_no)}</strong></td>
        <td>${order.order_date || '-'}</td>
        <td style="max-width:260px;font-size:11px;">${productsHtml}</td>
        <td><strong>${order.quantity || '-'}</strong></td>
        <td>${App.escapeHtml(order.salesperson_name || '-')}</td>
        <td>
          <input type="date" class="form-control ship-date"
            value="${order.shipping_date || ''}"
            onchange="updateShipping(${order.id}, this.value)"
            style="width:150px;padding:4px 6px;font-size:13px;"
            title="预计发货时间">
        </td>
        <td>
          <input type="text" class="notes-input warehouse-notes"
            value="${App.escapeHtml(order.warehouse_notes || '')}"
            onblur="updateWarehouseNotes(${order.id}, this.value)" placeholder="进度回复">
        </td>
        <td style="text-align:center;">${order.photo_request ? '📸' : '-'}</td>
        <td>${order.bring_goods === true ? '✅是' : order.bring_goods === false ? '❌否' : '-'}</td>
        <td>${order.inspection_date || "-"}</td>
        <td>${order.return_date || "-"}</td>
        <td style="display:flex;gap:4px;flex-wrap:wrap;">
          ${fileBtn}
          <select class="form-control status-select" onchange="updateStatus(${order.id}, this.value)" style="width:80px;">
            <option value="">- 待填写 -</option>
            ${CONFIG.ORDER_STATUSES.map(s =>
              `<option value="${s}" ${s === order.order_status ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
        </td>
      </tr>`;
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');

      orders.sort((a, b) => {
        const da = a.order_date || '', db = b.order_date || '';
        return whDateSortAsc ? da.localeCompare(db) : db.localeCompare(da);
      });

      const groups = {};
      orders.forEach(o => { const s = o.order_status; if (!groups[s]) groups[s] = []; groups[s].push(o); });

      const statusIcon = { '调货中': '📦', '路途中': '🚚', '已到货': '✅', '已完结': '🏁' };

      let html = '';
      // 先渲染「待处理」分组——管理员新建的订单状态为空，仓库需要优先看到
      const pendingOrders = groups[null] || [];
      if (pendingOrders.length > 0) {
        html += `<div class="card" style="margin-bottom:16px;border-left:4px solid #e07a5f;padding:16px;">
          <h4 style="margin:0 0 12px 0;">📋 待处理 (${pendingOrders.length})</h4>
          <div class="table-wrapper" style="overflow-x:auto;">
            <table><thead><tr>
              <th>到款单号</th><th>单据日期</th><th>产品明细</th><th>总数量</th><th>业务员</th>
              <th style="color:#e07a5f;">📅 预计发货时间</th>
              <th>进度回复</th><th>拍照</th><th>是否带来</th><th>验货时间</th><th>收回时间</th><th>操作</th>
            </tr></thead><tbody>`;
        pendingOrders.forEach(order => {
          html += renderOrderRow(order, '');
        });
        html += '</tbody></table></div></div>';
      }

      for (const status of CONFIG.ORDER_STATUSES) {
        if (!groups[status] || groups[status].length === 0) continue;

        html += `<div class="card" style="margin-bottom:16px;border-left:4px solid ${
          status === '调货中' ? '#e67e22' : status === '路途中' ? '#3498db' : status === '已到货' ? '#27ae60' : '#95a5a6'
        };padding:16px;">
          <h4 style="margin:0 0 12px 0;">${statusIcon[status]} ${status} (${groups[status].length})</h4>
          <div class="table-wrapper" style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>到款单号</th><th style="cursor:pointer;user-select:none;white-space:nowrap;" onclick="toggleDateSort()">单据日期 <span id="whDateSortIcon" style="font-size:11px;color:#999;">↓ 降序</span></th><th style="min-width:200px;">产品明细</th>
                  <th>总数量</th><th>业务员</th>
                  <th style="color:#e07a5f;font-weight:600;">📅 预计发货时间</th>
                  <th>进度回复</th><th>拍照</th><th>是否带来</th><th>验货时间</th><th>收回时间</th><th style="min-width:70px;">操作</th>
                </tr>
              </thead>
              <tbody>`;

        groups[status].forEach(order => {
          html += renderOrderRow(order, status);
        });

        html += '</tbody></table></div></div>';
      }

      container.innerHTML = html || '<p style="text-align:center;color:#999;padding:30px;">暂无匹配的订单</p>';
    }

    // ========== 仓库产品明细渲染 ==========
    function renderWarehouseProductDetail(productModel) {
      if (!productModel) return '<span style="color:#ccc;">-</span>';

      let products = null;
      if (typeof productModel === 'string' && productModel.startsWith('[')) {
        try { products = JSON.parse(productModel); } catch(e) {}
      }

      if (products && Array.isArray(products) && products.length > 0) {
        let html = '<div>';
        products.forEach((p, i) => {
          const brand = p.brand ? `<span style="background:#e8f0fe;color:#1a56db;padding:1px 5px;border-radius:3px;margin-right:3px;font-size:10px;">${App.escapeHtml(p.brand)}</span>` : '';
          const model = `<strong>${App.escapeHtml(p.model || '-')}</strong>`;
          const qty = p.qty ? `<span style="color:#e67e22;">×${p.qty}</span>` : '';
          const delivery = p.delivery ? `<span style="color:#888;font-size:10px;margin-left:4px;">📅${p.delivery}</span>` : '';
          html += `<div style="padding:2px 0;${i>0?'border-top:1px dotted #eee':''}">${brand}${model} ${qty}${delivery}</div>`;
        });
        html += '</div>';
        return html;
      }

      return `<span style="font-size:12px;color:#555;word-break:break-all;">${App.escapeHtml(productModel)}</span>`;
    }

    // ========== 仓库专属操作 ==========

    async function updateStatus(id, status) {
      showToast('更新中...', '');
      const { error } = await API.updateOrder(id, { order_status: status });
      if (error) {
        showToast('更新失败: ' + error.message, 'error');
      } else {
        showToast(`✅ 状态 → ${status}`, 'success');
        setTimeout(() => loadOrders(), 500);
      }
    }

    async function updateShipping(id, dateVal) {
      const { error } = await API.updateOrder(id, { shipping_date: dateVal || null });
      if (error) showToast('保存预计发货时间失败: ' + error.message, 'error');
      else console.log('[Warehouse] 预计发货时间已更新:', dateVal);
    }

    async function updateWarehouseNotes(id, notes) {
      const { error } = await API.updateOrder(id, { warehouse_notes: notes });
      if (error) showToast('备注保存失败: ' + error.message, 'error');
    }
  </script>
</body>
</html>
